name: Verify

on:
  push:
    branches: [master]
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same ref.
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Mandatory gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mandatory gate
        run: npm run verify

  smoke:
    name: Cross-runtime smoke (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun, deno, browser]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Install Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Playwright (browser)
        if: matrix.runtime == 'browser'
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run smoke:${{ matrix.runtime }}
