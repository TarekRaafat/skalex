      {
        "@type": "Question",
        "name": "What is Skalex?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex is the AI-first JavaScript database that ships vector search, agent memory, natural language queries, an MCP server, and AES-256-GCM encryption in a single zero-dependency package  -  no server, no config, no external services. All AI capabilities are built into the core with zero additional dependencies. It runs in Node.js, Bun, Deno, browsers, and edge runtimes. All data lives in your process's heap for instant, zero-overhead access  -  storage adapters control where data persists. Designed for single-process, local-first workloads: AI agents, CLI tools, desktop apps, edge workers, and offline-first apps."
        }
      },
      {
        "@type": "Question",
        "name": "Does Skalex have zero dependencies?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex has zero runtime dependencies. The structured store, query engine, schema validator, TTL, and migrations install nothing beyond the package itself."
        }
      },
      {
        "@type": "Question",
        "name": "Does Skalex work in the browser?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex is fully isomorphic and runs in Node.js (>=18), Bun, Deno 2.x, all modern browsers (via LocalStorageAdapter), and edge runtimes like Cloudflare Workers."
        }
      },
      {
        "@type": "Question",
        "name": "How does Skalex handle vector search?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex performs cosine similarity search over embedded documents. Pass embed: 'fieldName' on insert to auto-embed via OpenAI, Ollama, or a custom adapter. Use collection.search(query) for semantic search and collection.similar(id) for nearest-neighbour lookup."
        }
      },
      {
        "@type": "Question",
        "name": "What is the MCP server in Skalex?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "db.mcp() exposes the Skalex database as MCP (Model Context Protocol) tools for AI agents. It supports stdio transport for Claude Desktop and Cursor, and HTTP+SSE transport for web clients. AI agents can insert, query, update, and delete documents directly."
        }
      },
      {
        "@type": "Question",
        "name": "How do I install Skalex?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Install Skalex v4 via npm: npm install skalex@alpha. It works with Node.js >= 18, Bun, and Deno. No other dependencies are required."
        }
      },
      {
        "@type": "Question",
        "name": "Does Skalex support TypeScript?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex ships full TypeScript declarations including generics, mapped types, and union types. No @types/ package is needed. Use Collection<T> for fully typed collections."
        }
      },
      {
        "@type": "Question",
        "name": "How does Skalex encryption work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex uses AES-256-GCM at-rest encryption via the Web Crypto API (globalThis.crypto.subtle). Wrap any storage adapter with EncryptedAdapter and provide a 64-character hex key. Encryption is transparent to all callers and works in Node.js, Bun, Deno, and browsers."
        }
      },
      {
        "@type": "Question",
        "name": "Does Skalex support Ollama for local AI?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex ships OllamaEmbeddingAdapter (default model: nomic-embed-text) and OllamaLLMAdapter (default model: llama3.2) out of the box. Configure them via the ai option: new Skalex({ ai: { provider: 'ollama', embedModel: 'nomic-embed-text', model: 'llama3.2' } }). All vector search, agent memory, and natural language queries run entirely locally with no API cost and no network dependency."
        }
      },
      {
        "@type": "Question",
        "name": "When should I not use Skalex?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex is not the right tool when: multiple processes or servers need to share the same data concurrently; your dataset exceeds available RAM (all data is loaded into the process heap on connect(), regardless of which storage adapter you use); you need complex relational joins or full SQL query power; or you need high write concurrency across many clients. For those scenarios, use PostgreSQL, MongoDB, or SQLite directly."
        }
      },
      {
        "@type": "Question",
        "name": "Is Skalex production-ready?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The current release is v4.0.0-alpha.5. The API is largely stable but may change before the 4.0.0 stable release. It is suitable for production use in single-process, local-first workloads where the dataset fits in RAM  -  CLI tools, desktop apps, AI agents, edge workers, and offline-first apps. Pin the exact version in your package.json and review the CHANGELOG before upgrading."
        }
      },
      {
        "@type": "Question",
        "name": "How does Skalex agent memory work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "db.useMemory(sessionId) returns a Memory instance backed by a system collection. Use memory.remember(text) to store a text episode with a semantic embedding, memory.recall(query) for similarity-based retrieval, memory.context({ tokens }) to get an LLM-ready context string capped to a token budget, and memory.compress() to summarise older episodes via the configured LLM. Works with OpenAI, Anthropic, and Ollama adapters."
        }
      },
      {
        "@type": "Question",
        "name": "How does Skalex compare to lowdb or LokiJS?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex, lowdb, and LokiJS are all in-memory JavaScript document stores, but they serve different purposes. lowdb and LokiJS are general-purpose stores with no AI capabilities. Skalex is built specifically for AI-first workloads: vector search with cosine similarity, semantic agent memory, natural language queries via any LLM, and a built-in MCP server for Claude Desktop and Cursor are all first-class features that require zero additional dependencies. If you do not need AI capabilities, lowdb or LokiJS are simpler choices. If you do, Skalex ships everything in one package."
        }
      },
      {
        "@type": "Question",
        "name": "Is Skalex a vector database?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex is not a dedicated vector database. It is a document database with vector search built in. You store structured documents and optionally embed a field as a vector on insert. Queries can combine cosine similarity search with standard document filters in a single call (hybrid search). For billion-scale vector search, a dedicated vector database is a better fit. For applications where structured data and semantic search need to coexist without extra infrastructure, Skalex handles both in one package."
        }
      },
      {
        "@type": "Question",
        "name": "Can I use Skalex without an OpenAI API key?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex ships OllamaEmbeddingAdapter and OllamaLLMAdapter out of the box. With a locally running Ollama instance, all vector search, agent memory, and natural language queries run entirely on your machine with no API key, no API cost, and no network dependency. Set ai: { provider: 'ollama' } in the Skalex constructor to use it."
        }
      },
      {
        "@type": "Question",
        "name": "How large a dataset can Skalex handle?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex loads the full dataset into your process's heap on connect(). The practical limit depends on the available RAM in your runtime environment. In typical Node.js processes with the default 512 MB heap, tens of thousands to a few hundred thousand documents are handled comfortably. Larger heaps (set via --max-old-space-size) extend this further. For datasets that exceed available RAM, Skalex is not the right tool  -  use a server-based database instead."
        }
      },
      {
        "@type": "Question",
        "name": "What happens to my data if the process crashes?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Skalex uses atomic writes: data is written to a temporary file first, then renamed into place in a single OS-level operation. This means a crash mid-write cannot produce a corrupt or half-written file  -  you either have the previous version or the new version, never a broken state. Any writes that had not yet been flushed to the adapter at the time of the crash will be lost, so use autoSave: true or pass { save: true } on critical writes to flush immediately after each operation."
        }
      },
      {
        "@type": "Question",
        "name": "Which storage adapter should I use?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Choose based on your runtime: Node.js or Bun with filesystem access  -  FsAdapter (default, atomic writes, gz or json format). Bun with SQLite performance  -  BunSQLiteAdapter. Browser  -  LocalStorageAdapter. Cloudflare Workers  -  D1Adapter. LibSQL or Turso  -  LibSQLAdapter. Need encryption at rest  -  wrap any adapter with EncryptedAdapter. You can swap adapters without changing any application code."
        }
      },
      {
        "@type": "Question",
        "name": "How do I connect Skalex to Claude Desktop?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Call db.mcp({ transport: 'stdio' }).listen() in your entry point, then add Skalex to your Claude Desktop config file (claude_desktop_config.json) under mcpServers: { 'skalex': { 'command': 'node', 'args': ['/path/to/your/scripts/mcp-server.js'] } }. A ready-to-run stdio entry point ships at scripts/mcp-server.js. Claude Desktop will then have tools to find, insert, update, delete, and semantically search your data directly."
        }
      },
      {
        "@type": "Question",
        "name": "Isn't Skalex just a Map with a JSON file underneath?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "At the most reductive level, yes  -  and so is every database at some layer of abstraction. What Skalex provides on top of that is what takes weeks to assemble correctly on your own: a full embedding pipeline with OpenAI and Ollama adapters; cosine similarity vector search with hybrid filter support; semantic agent memory with compression and token-aware context generation; natural language query translation via any LLM; a complete MCP server with 8 tools, stdio and HTTP transports, and per-collection access control; secondary indexes with O(1) lookups; atomic writes that survive crashes; TTL sweeps; versioned migrations; in-memory snapshot transactions with automatic rollback; soft deletes; an append-only changelog with point-in-time restore; and a cross-runtime isomorphic build that runs identically in Node.js, Bun, Deno, browsers, and edge runtimes without polyfills. You could build all of that yourself. Skalex is the choice when you would rather ship."
        }
      },
      {
        "@type": "Question",
        "name": "How do I upgrade from Skalex v3 to v4?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "v4 is a ground-up rewrite with several breaking changes: Node.js >=18 is now required; sort direction changed to MongoDB-standard (1 ascending, -1 descending); db.mcp() defaults to read-only access; db.namespace() sanitises IDs; MCP HTTP CORS is opt-in; and CSV import via db.import() has been removed. Full step-by-step migration instructions are in MIGRATION.md in the GitHub repository."
        }
      },
      {
        "@type": "Question",
        "name": "Does Skalex send any data to the cloud?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Only if you configure a cloud-based AI adapter. If you use the OpenAI or Anthropic adapters, document content sent for embedding or natural language queries will be transmitted to those providers' APIs. If you use the Ollama adapter, all processing happens locally on your machine  -  no data leaves your network at any point. With Ollama and a local storage adapter such as FsAdapter, Skalex operates entirely offline with zero external network calls."
        }
      },
      {
        "@type": "Question",
        "name": "Can I use Skalex with Anthropic Claude as the LLM?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex ships AnthropicLLMAdapter out of the box. Configure it via the ai option: new Skalex({ ai: { provider: 'anthropic', apiKey: process.env.ANTHROPIC_KEY } }). The default model is claude-haiku-4-5, but any Anthropic model can be specified via the model option. The adapter is used for db.ask() natural language queries and memory.compress() summarisation."
        }
      },
      {
        "@type": "Question",
        "name": "Does Skalex work completely offline?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex has no network dependency by design. With a local storage adapter (FsAdapter, BunSQLiteAdapter, or LocalStorageAdapter) and the Ollama adapter for AI features, the entire stack  -  vector search, agent memory, natural language queries, and the MCP server  -  runs on your machine with no internet connection required. This makes it well suited for air-gapped environments, desktop applications, and CLI tools that need to work offline."
        }
      },
      {
        "@type": "Question",
        "name": "Can I bring my own embedding model or LLM?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex exposes an EmbeddingAdapter interface and an LLMAdapter interface. Implement either to connect any embedding model or language model  -  self-hosted, proprietary, or from any provider. Pass the instance directly to the Skalex constructor via the embeddingAdapter or llmAdapter options. The built-in OpenAI, Anthropic, and Ollama adapters follow the same interface and can be used as implementation references."
        }
      },
      {
        "@type": "Question",
        "name": "Can I use Skalex in a commercial project?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Skalex is released under the Apache 2.0 license. You can use it in commercial products, modify it, and distribute it freely without royalties or restrictions. Attribution is appreciated but not required in the product itself. The full license text is available in the GitHub repository."
        }
      }
